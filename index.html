<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Especificações de GPU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Especificações de GPU</h1>
        <p>Análise técnica de largura de banda e consumo para modelos de hardware.</p>

        <div class="calc-box">
            <div class="input-group">
                <label for="arquitetura">Arquitetura / Marca:</label>
                <select id="arquitetura">
                    <option value="nvidia">NVIDIA GeForce</option>
                    <option value="amd">AMD Radeon</option>
                </select>
            </div>

            <div class="input-group">
                <label for="clock">Clock da Memória (MHz):</label>
                <input type="number" id="clock" placeholder="Ex: 1750" value="1750">
            </div>

            <div class="input-group">
                <label for="barramento">Largura do Barramento (Bits):</label>
                <input type="number" id="barramento" placeholder="Ex: 128" value="128">
            </div>

            <button onclick="processarCalculo()">Calcular Largura de Banda</button>

            <div id="resultado" class="result-box" style="display: none;">
                <h3>Resultado da Análise:</h3>
                <p><strong>Largura de Banda:</strong> <span id="val-banda">0</span> GB/s</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
